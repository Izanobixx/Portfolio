<div id="loading">

<button id = "bored-button" style = "
    position:fixed;
    bottom:0px;
    right:0px;
    z-index:9999;
    padding: 8px 16px;
    background: #ece9d8;
    border: 2px solid #0047ab;
    border-radius: 4px;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    font-size: 14px;
    color: #1e1e1e;
    cursor: pointer;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    transition: all 0.1s;
">Me aburro</button>

<div id="subway-window" style="
    display: none;
    position: fixed;
    z-index: 99999;
    background: #ece9d8;
    border: 2px solid #0047ab;
    border-radius: 8px 8px 0 0;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
    min-width: 250px;
    min-height: 180px;
    overflow: hidden;
    width: 400px;
    height: 260px;
    resize: none;
">
    <!-- Barra de título (arrastrable) -->
    <div id="subway-titlebar" style="
        height: 28px;
        background: linear-gradient(#0a5ad4, #003caa);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 6px 0 10px;
        cursor: grab;
        user-select: none;
        flex-shrink: 0;
    ">
        <span style="font-size: 13px; font-weight: bold;">Subway_Surfers.mov</span>
        <div style="display: flex; gap: 4px;">
            <button id="close-subway" style="
                width: 28px;
                height: 22px;
                border: none;
                background: transparent;
                color: white;
                cursor: pointer;
                font-size: 18px;
                line-height: 1;
                padding: 0;
            ">X</button>
        </div>
    </div>

    <!-- Contenedor del video (con aspect ratio) -->
    <div id="subway-video-container" style="
        position: relative;
        width: 100%;
        height: calc(100% - 28px);
        background: #000;
        overflow: hidden;
        pointer-events: none;
    ">
        <iframe id="subway-iframe"
            width="100%"
            height="100%"
            style="display: block; border: none;"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Borde de reescalado (esquina inferior derecha) -->
    <div id="subway-resize-handle" style="
        position: absolute;
        bottom: 0;
        right: 0;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
        background: transparent;
        z-index: 10;
    "></div>
</div>
